version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - yum install -y postgresql-devel
    build:
      - python3 -m pip install -r requirements.txt --target /app/backend/deps
run:
  command: sh entrypoint.sh
  network:
    port: 8000
  env:
    - name: PYTHONPATH
      value: "/app/backend:/app/backend/deps"
    - name: PATH
      value: "/app/backend/deps/bin:/usr/local/bin:/usr/bin:/bin"
    - name: BI_SCHEMA
      value: "app_cos_summit_prd"
    - name: DISABLE_AUTH
      value: "true"
    - name: ATHENA_MOCK_MODE
      value: "true"
    - name: SNAPSHOT_LOCAL_DIR
      value: "/tmp/snapshots"
  secrets:
    - name: DB_USERNAME
      value-from: "arn:aws:secretsmanager:ap-northeast-1:559784498787:secret:app_COS_summit_prd-1eqRRx:username::"
    - name: DB_PASSWORD
      value-from: "arn:aws:secretsmanager:ap-northeast-1:559784498787:secret:app_COS_summit_prd-1eqRRx:password::"
    - name: DB_HOST
      value-from: "arn:aws:secretsmanager:ap-northeast-1:559784498787:secret:app_COS_summit_prd-1eqRRx:host::"
    - name: DB_PORT
      value-from: "arn:aws:secretsmanager:ap-northeast-1:559784498787:secret:app_COS_summit_prd-1eqRRx:port::"
    - name: DB_NAME
      value-from: "arn:aws:secretsmanager:ap-northeast-1:559784498787:secret:app_COS_summit_prd-1eqRRx:dbname::"
