version: 1.0
runtime: nodejs22
build:
  commands:
    build:
      - npm install
      - NEXT_PUBLIC_API_URL=https://cos-summit-api.cosmaxhub.com/api NODE_OPTIONS="--max-old-space-size=768" npm run build
run:
  command: npm start
  network:
    port: 3000
  env:
    - name: NODE_ENV
      value: "production"
