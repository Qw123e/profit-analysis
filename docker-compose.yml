version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bi_meta
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bi_meta"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/bi_meta
      AWS_REGION: ap-northeast-2
      ATHENA_WORKGROUP: primary
      ATHENA_OUTPUT_S3: s3://mock-bucket/athena/
      ATHENA_MOCK_MODE: "true"
      SNAPSHOT_LOCAL_DIR: /app/data/snapshots
      SEED_MANIFEST_PATH: /app/seed/manifest.json
      SEED_BASE_DIR: /app
      DISABLE_AUTH: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./seed:/app/seed
      - ./frontend/src/app/dashboards:/app/frontend_dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    environment:
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
